<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login | Secure Access</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 
           ========================================
           DESIGN SYSTEM & VARIABLES
           ========================================
        */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #10b981;
            --error: #ef4444;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius-lg: 1.5rem;
            --radius-md: 0.75rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 
           ========================================
           GLOBAL STYLES
           ========================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 1.5rem;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 
           ========================================
           LOGIN CARD
           ========================================
        */
        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 
           ========================================
           FORM ELEMENTS
           ========================================
        */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: var(--transition);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 3rem 0.75rem 2.75rem !important;
            border: 1.5px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
            background: #fcfcfd;
        }

        .input-field:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .input-field:focus + svg {
            color: var(--primary);
        }

        .input-field.error {
            border-color: var(--error);
        }

        .error-text {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        /* Mode switching transitions */
        .form-group-name {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .signup-mode .form-group-name {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 1.5rem;
        }

        .login-mode .form-extras {
            display: flex;
        }

        .signup-mode .form-extras {
            display: none;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            border-radius: 50%;
            transition: var(--transition);
            z-index: 10;
        }

        .password-toggle:hover {
            background-color: #f1f5f9;
            color: var(--primary);
        }

        /* Form Extras */
        .form-extras {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkbox-custom {
            height: 1.25rem;
            width: 1.25rem;
            background-color: #e2e8f0;
            border-radius: 4px;
            margin-right: 0.5rem;
            position: relative;
            transition: var(--transition);
        }

        .remember-me:hover input ~ .checkbox-custom {
            background-color: #cbd5e1;
        }

        .remember-me input:checked ~ .checkbox-custom {
            background-color: var(--primary);
        }

        .checkbox-custom:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-me input:checked ~ .checkbox-custom:after {
            display: block;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Feedback Messages */
        .feedback-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            display: none;
            animation: fadeIn 0.3s ease-in;
            text-align: center;
        }

        .feedback-message.visible {
            display: block !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .feedback-message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .feedback-message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* Footer Links */
        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .signup-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.25rem;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        /* 
           ========================================
           RESPONSIVENESS
           ========================================
        */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Header -->
        <header class="login-header">
            <div class="logo">V</div>
            <h1 id="headerTitle">Welcome back</h1>
            <p id="headerSubtitle">Please enter your details to sign in</p>
        </header>

        <!-- Login Form -->
        <form id="loginForm" class="login-mode" novalidate>
            <!-- Name Field (Signup only) -->
            <div class="form-group form-group-name">
                <label for="name" class="label">Full Name</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="name" class="input-field" placeholder="John Doe">
                </div>
                <div id="nameError" class="error-text">Name is required</div>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email" class="label">Email Address</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
                </div>
                <div id="emailError" class="error-text">Please enter a valid email address</div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="label">Password</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                    <button type="button" id="passwordToggle" class="password-toggle" aria-label="Toggle password visibility">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <div id="passwordError" class="error-text">Password is required</div>
            </div>

            <!-- Extras: Remember Me & Forgot Password -->
            <div class="form-extras">
                <label class="remember-me">
                    <input type="checkbox">
                    <span class="checkbox-custom"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="btn-submit">
                <span id="btnText">Sign in</span>
                <div id="spinner" class="spinner"></div>
            </button>
        </form>

        <!-- Feedback Messages -->
        <div id="feedback" class="feedback-message"></div>

        <!-- Footer -->
        <footer class="login-footer">
            <span id="footerText">Don't have an account?</span> 
            <a href="#" id="toggleModeLink" class="signup-link">Sign up</a>
        </footer>
    </div>

    <script>
        /* 
           ========================================
           CLIENT-SIDE LOGIC
           ========================================
        */

        const loginForm = document.getElementById('loginForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const feedback = document.getElementById('feedback');
        
        const headerTitle = document.getElementById('headerTitle');
        const headerSubtitle = document.getElementById('headerSubtitle');
        const footerText = document.getElementById('footerText');
        const toggleModeLink = document.getElementById('toggleModeLink');

        let isLoginMode = true;

        // SVG icons for password toggle
        const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

        /**
         * Toggle Password Visibility
         */
        passwordToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword ? eyeClosed : eyeOpen;
        });

        /**
         * Toggle between Login and Signup modes
         */
        toggleModeLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            // Update UI
            loginForm.className = isLoginMode ? 'login-mode' : 'signup-mode';
            headerTitle.textContent = isLoginMode ? 'Welcome back' : 'Create account';
            headerSubtitle.textContent = isLoginMode ? 'Please enter your details to sign in' : 'Join our community today';
            btnText.textContent = isLoginMode ? 'Sign in' : 'Sign up';
            footerText.textContent = isLoginMode ? "Don't have an account?" : 'Already have an account?';
            toggleModeLink.textContent = isLoginMode ? 'Sign up' : 'Sign in';
            
            // Reset errors, fields and feedback
            resetErrors();
            clearFields();
            feedback.classList.remove('visible', 'success', 'error');
            feedback.textContent = '';
        });

        /**
         * Validate Email Format
         */
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        /**
         * Handle Form Submission
         */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset states
            resetErrors();
            feedback.classList.remove('visible', 'success', 'error');
            feedback.textContent = '';

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            let isValid = true;

            // Validation
            if (!isLoginMode && !name) {
                showError('name', 'Name is required');
                isValid = false;
            }

            if (!email || !validateEmail(email)) {
                showError('email', !email ? 'Email is required' : 'Please enter a valid email address');
                isValid = false;
            }

            if (!password) {
                showError('password', 'Password is required');
                isValid = false;
            }

            if (!isValid) return;

            // Start loading state
            setLoading(true);

            try {
                // Simulate API call
                const response = await simulateApiCall(email, password, isLoginMode ? 'login' : 'signup', name);
                
                // Show success
                feedback.textContent = response.message;
                feedback.classList.add('success', 'visible');

                // If signup was successful, clear fields so they can login
                if (!isLoginMode) {
                    clearFields();
                }
            } catch (err) {
                // Show error
                feedback.textContent = err.message;
                feedback.classList.add('error', 'visible');
            } finally {
                setLoading(false);
            }
        });

        /**
         * Mock API Call Logic with persistence
         */
        function simulateApiCall(email, password, mode, name = '') {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    console.log(`Executing ${mode} for: ${email}`);
                    
                    // Get existing users from localStorage
                    let users = [];
                    try {
                        users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
                    } catch (e) {
                        console.error('Failed to parse users from localStorage', e);
                        users = [];
                    }
                    
                    if (mode === 'signup') {
                        // Check if user already exists
                        if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                            reject({ success: false, message: 'An account with this email already exists.' });
                        } else {
                            // Add new user
                            users.push({ name, email: email.toLowerCase(), password });
                            localStorage.setItem('registeredUsers', JSON.stringify(users));
                            console.log('User registered successfully. Current users:', users.length);
                            resolve({ success: true, message: `Account created for ${name}! You can now sign in.` });
                        }
                    } else {
                        // Login mode
                        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
                        
                        // Default demo user check
                        const isDemoUser = (email.toLowerCase() === 'demo@example.com' && password === 'password123');

                        if (user || isDemoUser) {
                            const displayName = user ? user.name : 'Demo User';
                            resolve({ success: true, message: `Login successful! Welcome back, ${displayName}.` });
                        } else {
                            console.log('Login failed. Provided:', email, password);
                            reject({ success: false, message: 'Invalid email or password. Please try again.' });
                        }
                    }
                }, 1500);
            });
        }

        /**
         * UI Helper: Set Loading State
         */
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'block';
            spinner.style.display = isLoading ? 'block' : 'none';
            nameInput.disabled = isLoading;
            emailInput.disabled = isLoading;
            passwordInput.disabled = isLoading;
        }

        /**
         * UI Helper: Show Error
         */
        function showError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorText = document.getElementById(`${fieldId}Error`);
            input.classList.add('error');
            errorText.textContent = message;
            errorText.style.display = 'block';
        }

        /**
         * UI Helper: Reset Errors
         */
        function resetErrors() {
            nameInput.classList.remove('error');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
            document.getElementById('nameError').style.display = 'none';
            document.getElementById('emailError').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';
        }

        /**
         * UI Helper: Clear Fields
         */
        function clearFields() {
            nameInput.value = '';
            emailInput.value = '';
            passwordInput.value = '';
        }
    </script>
</body>
</html>
